name: Lotto50 자동 동기화

on:
  # 매주 토요일 밤 9시 (한국시간 = UTC 12:00)
  schedule:
    - cron: '0 12 * * 6'

  # 수동 실행 가능 (Actions 탭에서 직접 실행)
  workflow_dispatch:
    inputs:
      mode:
        description: '수집 모드 (incremental=최신만 / full=1회~전체)'
        required: false
        default: 'incremental'
        type: choice
        options:
          - incremental
          - full

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: Lotto50 동기화 실행
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SYNC_MODE: ${{ github.event.inputs.mode || 'incremental' }}
        run: python sync_lotto50.py
